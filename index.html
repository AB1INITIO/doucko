<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ab initio</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var s = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', s || (d ? 'dark' : 'light'));
    })();
  </script>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle dark mode"></button>

  <main class="landing">
    <div class="landing-stack">
      <p class="welcome">Ahoj, ako Ti dnes pomôžem?</p>
      <nav class="btn-group" aria-label="sections">
        <a href="mat/" class="btn">MAT</a>
        <a href="inf/" class="btn">INF</a>
        <a href="ine/" class="btn">INÉ</a>
      </nav>
    </div>
  </main>

  <footer>
    <a href="/">~/</a>
  </footer>

  <script>
    document.querySelector('.theme-toggle').addEventListener('click', function() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
