<!DOCTYPE html>
<html lang="$if(lang)$$lang$$else$en$endif$">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$if(title)$$title$ · $endif$ab initio</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
  <style>$highlighting-css$</style>
  <script>
    (function() {
      var s = localStorage.getItem('theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', s || (d ? 'dark' : 'light'));
    })();
  </script>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle dark mode"></button>
  <a class="back" href="./">../</a>

  <article>
    $body$
  </article>

  <footer>
    <a href="../">~/</a>
  </footer>

  <script>
    document.querySelector('.theme-toggle').addEventListener('click', function() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
  <script>
    document.querySelectorAll("article h1, article h2, article h3").forEach(function(el) {
      if (!el.id) return;
      var a = document.createElement("a");
      a.href = "#" + el.id;
      a.className = "heading-anchor";
      a.textContent = "#";
      el.appendChild(a);
    });
  </script>
  <script>
    document.querySelectorAll("span.math.inline").forEach(function(el) {
      katex.render(el.textContent, el, { throwOnError: false, displayMode: false });
    });
    document.querySelectorAll("span.math.display").forEach(function(el) {
      katex.render(el.textContent, el, { throwOnError: false, displayMode: true });
    });
  </script>
</body>
</html>
